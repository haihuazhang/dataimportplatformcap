# ---
spring:
  profiles:
    active: pg
  batch:
    job:
      enabled: false
  quartz:
    properties:
      org:
        quartz:
          jobStore:
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
