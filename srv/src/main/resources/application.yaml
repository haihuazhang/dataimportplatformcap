---
spring:
  web.resources.static-locations: "file:./app"
  config:
    activate:
      on-profile: pg
  datasource:
    url: jdbc:postgresql://localhost:5432/batchimportcat
    username: haihuazhang
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  sql:
    init:
      mode: always
      schema-locations:
        # - classpath:schema-pg-reset.sql
        # - classpath:org/springframework/batch/core/schema-drop-postgresql.sql
        # - classpath:org/springframework/batch/core/schema-postgresql.sql
        # - classpath:org/quartz/impl/jdbcjobstore/tables_postgres.sql
        # - classpath:schema-pg-compat.sql
        - classpath:schema.sql
  batch:
    jdbc:
      initialize-schema: NEVER
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: NEVER
cds:
  dataSource:
    auto-config.enabled: true

---
spring:
  web.resources.static-locations: "file:./app/,file:../app/,file:./dataimportplatformcap/app/"
  config:
    activate:
      on-profile: hybrid
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: NEVER
cds:
  dataSource:
    auto-config.enabled: true


